<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard FV ARG</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a}
.page{max-width:1100px;margin:0 auto;padding:2rem 1.5rem}
.top-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:2px solid #0C447C}
.head-title{font-size:20px;font-weight:700;color:#0C447C}
.head-sub{font-size:12px;color:#888;margin-top:3px}
.badge{font-size:10px;background:#fdecea;color:#c0392b;padding:3px 10px;border-radius:20px;font-weight:600}
.year-tabs,.view-tabs,.kpi-tabs{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.ytab,.vtab,.ktab,.mbtn{padding:6px 14px;border-radius:8px;border:1px solid #ddd;font-size:12px;cursor:pointer;background:#fff;color:#555;font-family:inherit;font-weight:600;transition:all .15s}
.ytab.active{background:#0C447C;color:#fff;border-color:#0C447C}
.vtab.active{background:#185FA5;color:#fff;border-color:#185FA5}
.ktab.active{background:#993556;color:#fff;border-color:#993556}
.mbtn.active{background:#185FA5;color:#fff;border-color:#185FA5}
.mbtn.off{opacity:.35;cursor:not-allowed}
.month-nav{display:flex;gap:7px;margin-bottom:1.5rem;flex-wrap:wrap}
.section-title{font-size:11px;font-weight:700;color:#888;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
.grid-cards{display:grid;gap:10px;margin-bottom:1.5rem}
.rep-card{background:#fff;border-radius:10px;padding:14px;border:1px solid #e8e8e4}
.rep-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;margin-bottom:8px}
.rep-name{font-size:13px;font-weight:600}
.rep-val{font-size:24px;font-weight:700;line-height:1.1}
.rep-label{font-size:11px;color:#888;margin-top:2px}
.rank-badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:10px;margin-top:5px;font-weight:600}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem}
.chart-card{background:#fff;border-radius:12px;padding:1.25rem;border:1px solid #e8e8e4}
.chart-title{font-size:13px;font-weight:600;color:#333;margin-bottom:.75rem}
.chart-wrap{position:relative;height:200px}
.bar-wrap{position:relative}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:8px;font-size:11px;color:#666}
.legend span{display:flex;align-items:center;gap:4px}
.ldot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.notice{background:#fff8e1;border:1px solid #ffe082;border-radius:10px;padding:10px 14px;font-size:12px;color:#7a5c00;margin-bottom:1.5rem}
.gbar{background:#deeaf8;border-radius:10px;padding:10px 14px;margin-bottom:1.5rem;font-size:12px;color:#0C447C;display:flex;align-items:center;gap:10px}
.gav{width:28px;height:28px;border-radius:50%;background:#185FA5;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.scorecard{background:#fff;border:1px solid #e8e8e4;border-radius:12px;overflow:hidden;margin-bottom:1rem}
.metodo{background:#f0f4fa;border:1px solid #c5d8f0;border-radius:10px;padding:10px 14px;font-size:12px;color:#3a5a80;line-height:1.7;margin-bottom:1rem}
.metodo-title{font-size:10px;font-weight:700;color:#185FA5;letter-spacing:.8px;text-transform:uppercase;margin-bottom:4px}
.rolling-pill{font-size:11px;background:#e8f0fb;color:#185FA5;padding:3px 10px;border-radius:20px;font-weight:600}
.footer{text-align:center;font-size:12px;color:#aaa;margin-top:2rem;padding-top:1rem;border-top:1px solid #e8e8e4}
.loading{text-align:center;padding:3rem;color:#888;font-size:14px}
.spinner{width:32px;height:32px;border:3px solid #ddd;border-top-color:#0C447C;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:#fdecea;border:1px solid #f5c6c6;border-radius:10px;padding:12px 16px;font-size:13px;color:#c0392b;margin-bottom:1.5rem}
@media(max-width:700px){.two-col{grid-template-columns:1fr}.grid-cards{grid-template-columns:repeat(2,1fr)!important}}
</style>
</head>
<body>
<div class="page">
<div class="top-header">
  <div>
    <div class="head-title">Dashboard FV ARG &mdash; 2025/2026</div>
    <div class="head-sub">Performance mensual &middot; KPIs &middot; <span id="statusTxt">Cargando...</span></div>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <button id="btnActualizar" style="font-size:11px;background:#e8faf0;color:#0F6E56;padding:4px 12px;border-radius:20px;border:none;cursor:pointer;font-weight:600">&#8635; Actualizar</button>
    <span class="badge">Confidencial</span>
  </div>
</div>
<div id="errorBox" class="error-box" style="display:none"></div>
<div id="mainContent" style="display:none">
  <div class="year-tabs">
    <button class="ytab active" id="y25">2025 &mdash; A&ntilde;o completo</button>
    <button class="ytab" id="y26">2026 &mdash; Mar'25 a Feb'26</button>
  </div>
  <div class="view-tabs">
    <button class="vtab active" id="vk">KPIs mensuales</button>
    <button class="vtab" id="vr">Resumen anual</button>
  </div>
  <div id="n26" class="notice" style="display:none">&#9888; <strong>2026 en curso.</strong> Gabriela excluida del ranking (Jefa de Equipo).</div>
  <div id="g26" class="gbar" style="display:none"><div class="gav">GA</div><div id="g26t"></div></div>
  <div id="vKPI">
    <div class="kpi-tabs" id="kpiT"></div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
      <span class="section-title" style="margin:0">Mes:</span>
      <span class="rolling-pill" id="rp" style="display:none">Evoluci&oacute;n: &uacute;ltimos 12 meses</span>
    </div>
    <div class="month-nav" id="monN"></div>
    <div class="section-title" id="cT"></div>
    <div class="grid-cards" id="crd"></div>
    <div class="two-col">
      <div class="chart-card"><div class="chart-title" id="bT"></div><div class="bar-wrap" id="bW"><canvas id="bC"></canvas></div></div>
      <div class="chart-card"><div class="chart-title" id="lT"></div><div id="lL" class="legend"></div><div class="chart-wrap"><canvas id="lC"></canvas></div></div>
    </div>
  </div>
  <div id="vRES" style="display:none">
    <div class="section-title" id="scT"></div>
    <div class="scorecard" id="scE"></div>
    <div class="metodo"><div class="metodo-title">Metodolog&iacute;a</div><span id="mT"></span></div>
  </div>
</div>
<div id="loadingDiv" class="loading"><div class="spinner"></div>Cargando datos...</div>
<div class="footer">Dashboard FV ARG &middot; Confidencial &middot; &Uacute;ltima actualizaci&oacute;n: <span id="lastUp">&mdash;</span></div>
</div>
<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSYKhuv5B65hRwb7KnWy5A5W6_-CbhTXf5mvdyNw1wjogejhSNGoom1SeaLAbc3xknyhAseO22r_M-R/pub?gid=0&single=true&output=csv";
const PAL = [{bg:'#993556',light:'#f5dce6',text:'#72243E'},{bg:'#0F6E56',light:'#d6f0e8',text:'#085041'},{bg:'#185FA5',light:'#deeaf8',text:'#0C447C'},{bg:'#854F0B',light:'#faeada',text:'#633806'},{bg:'#888780',light:'#ededea',text:'#444441'},{bg:'#5B3FA6',light:'#ebe5f8',text:'#3d2a72'},{bg:'#1a7a4a',light:'#d4f0e2',text:'#0e5232'}];
const KS = [{key:'Calls',label:'Calls'},{key:'Pxs',label:'PXS'},{key:'Sell Out IV',label:'Sell Out IV'},{key:'Bonos PAP',label:'Bonos PAP'},{key:'Reportes PSP',label:'Reportes PSP'}];
const MO = ['ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO','JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'];
const MS = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
let R={2025:{},2026:{}},C={},AL=[],JF=null,FR=[],yr=2025,kp=KS[0].key,vw='k',mi=0,bI=null,lI=null;
const cap = s => s[0].toUpperCase()+s.slice(1).toLowerCase();
const sm = a => a ? a.filter(v=>v!==null).reduce((x,y)=>x+y,0) : 0;

function parseCSV(text) {
  if(text.charCodeAt(0)===0xFEFF) text=text.slice(1);
  text=text.trim();
  const lines = text.split('\n');
  if(lines.length < 2) return [];
  const sep = lines[0].includes('\t') ? '\t' : (lines[0].includes(';') ? ';' : ',');
  const parseLine = function(line) {
    const parts=[]; let cur='',inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
      else if(c===sep&&!inQ){parts.push(cur.trim());cur='';}
      else cur+=c;
    }
    parts.push(cur.trim());
    return parts;
  };
  const norm = function(h){ return h.replace(/"/g,'').trim().toLowerCase(); };
  const hdrs = parseLine(lines[0]).map(norm);
  const iR = hdrs.findIndex(function(h){return h.indexOf('rep')>=0;});
  const iI = hdrs.findIndex(function(h){return h.indexOf('ind')>=0;});
  const iM = hdrs.findIndex(function(h){return h==='mes';});
  const iV = hdrs.findIndex(function(h){return h.indexOf('val')>=0;});
  const iA = hdrs.findIndex(function(h){return h.indexOf('a')>=0&&h.length<=5;});
  if([iR,iI,iM,iV].some(function(i){return i<0;})) throw new Error('Columnas no encontradas: '+hdrs.join(','));
  const rows = [];
  lines.slice(1).forEach(function(line) {
    if(!line.trim()) return;
    const p = parseLine(line);
    const rep = (p[iR]||'').replace(/"/g,'').trim().toUpperCase();
    const ind = (p[iI]||'').replace(/"/g,'').trim();
    const mes = (p[iM]||'').replace(/"/g,'').trim().toUpperCase();
    const valS = (p[iV]||'').replace(/"/g,'').trim();
    const anioS = (p[iA]||'2025').replace(/"/g,'').trim();
    const anio = parseInt(anioS) || 2025;
    if(!rep||!ind||!mes) return;
    const val = (valS===''||valS==='-') ? null : parseFloat(valS.replace(',','.'));
    const mIdx = MO.indexOf(mes);
    if(mIdx<0) return;
    rows.push({r:rep,i:ind,m:mIdx,v:val,a:anio});
  });
  return rows;
}
function buildRAW(rows) {
  R={2025:{},2026:{}};C={};AL=[];JF=null;FR=[];
  const rs=new Set();
  KS.forEach(k=>{R[2025][k.key]={};R[2026][k.key]={};});
  rows.forEach(d=>{
    const a=d.a||2025;
    if(!R[a])R[a]={};
    if(!R[a][d.i])R[a][d.i]={};
    if(!R[a][d.i][d.r])R[a][d.i][d.r]=Array(12).fill(null);
    R[a][d.i][d.r][d.m]=d.v;
    rs.add(d.r);
  });
  AL=[...rs].sort();
  AL.forEach((r,i)=>{C[r]=PAL[i%PAL.length];});
  const r6=new Set();
  Object.values(R[2026]).forEach(k=>Object.keys(k).forEach(r=>r6.add(r)));
  r6.forEach(r=>{if(r==='GABRIELA')JF=r;else FR.push(r);});
}

async function loadData() {
  document.getElementById('loadingDiv').style.display='block';
  document.getElementById('mainContent').style.display='none';
  document.getElementById('errorBox').style.display='none';
  document.getElementById('statusTxt').textContent='Actualizando...';
  try {
    const resp = await fetch(CSV_URL);
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    const text = await resp.text();
    if(text.trim().startsWith('<')) throw new Error('La Sheet no esta publicada como CSV');
    const rows = parseCSV(text);
    if(rows.length===0) throw new Error('No se encontraron datos validos');
    buildRAW(rows);
    document.getElementById('lastUp').textContent = new Date().toLocaleString('es-AR');
    document.getElementById('statusTxt').textContent = rows.length+' registros cargados';
    document.getElementById('loadingDiv').style.display='none';
    document.getElementById('mainContent').style.display='block';
    bKPI();bMon();rAll();
  } catch(e) {
    document.getElementById('loadingDiv').style.display='none';
    document.getElementById('errorBox').textContent='Error: '+e.message;
    document.getElementById('errorBox').style.display='block';
    document.getElementById('statusTxt').textContent='Error al cargar';
  }
}

function rp(){if(yr===2026)return FR;const s=new Set();Object.values(R[2025]).forEach(k=>Object.keys(k).forEach(r=>s.add(r)));return[...s];}
function gv(r){const d=R[yr]&&R[yr][kp]&&R[yr][kp][r];return(d&&d[mi]!==null&&d[mi]!==undefined)?d[mi]:null;}
function rw(){return rp().filter(r=>gv(r)!==null).sort((a,b)=>gv(b)-gv(a));}
function mons(){
  if(yr===2025)return MS.map((m,i)=>({l:m+' 2025',i}));
  const av=new Set();
  Object.values(R[2026]).forEach(k=>Object.values(k).forEach(a=>a.forEach((v,i)=>{if(v!==null)av.add(i);})));
  return[...av].sort((a,b)=>a-b).map(i=>({l:MS[i]+' 2026',i}));
}
function ml(){return yr===2025?MS[mi]+' 2025':MS[mi]+' 2026';}
function kl(){const k=KS.find(k=>k.key===kp);return k?k.label:kp;}

function bKPI(){
  const c=document.getElementById('kpiT');c.innerHTML='';kp=KS[0].key;
  KS.forEach((k,i)=>{
    const b=document.createElement('button');
    b.className='ktab'+(i===0?' active':'');
    b.textContent=k.label;
    b.addEventListener('click',function(){sKPI(k.key,b);});
    c.appendChild(b);
  });
}

function bMon(){
  const ms=mons();
  if(!ms.find(m=>m.i===mi))mi=ms[0]?ms[0].i:0;
  const c=document.getElementById('monN');c.innerHTML='';
  ms.forEach(function(m){
    const has=rp().some(function(r){const d=R[yr]&&R[yr][kp]&&R[yr][kp][r];return d&&d[m.i]!==null;});
    const b=document.createElement('button');
    b.className='mbtn'+(m.i===mi?' active':'')+(!has?' off':'');
    b.textContent=m.l;
    if(has){(function(idx){b.addEventListener('click',function(){sMon(idx);});})(m.i);}
    c.appendChild(b);
  });
}

function rCards(){
  const rs=rw();
  document.getElementById('cT').textContent=kl()+' — '+ml();
  document.getElementById('crd').style.gridTemplateColumns='repeat('+Math.max(rs.length,1)+',minmax(0,1fr))';
  let h='';
  rs.forEach(function(r,i){
    const v=gv(r);
    h+='<div class="rep-card">';
    h+='<div class="rep-avatar" style="background:'+C[r].light+';color:'+C[r].text+'">'+r.slice(0,2)+'</div>';
    h+='<div class="rep-name">'+cap(r)+'</div>';
    h+='<div class="rep-val">'+(v!==null?v.toLocaleString('es-AR'):'&mdash;')+'</div>';
    h+='<div class="rep-label">'+kl()+'</div>';
    h+='<div class="rank-badge" style="background:'+C[r].light+';color:'+C[r].text+'">#'+(i+1)+'</div>';
    h+='</div>';
  });
  document.getElementById('crd').innerHTML=h;
}

function rBar(){
  const rs=rw();
  document.getElementById('bT').textContent='Ranking — '+kl()+' '+ml();
  document.getElementById('bW').style.height=(rs.length*50+40)+'px';
  if(bI)bI.destroy();
  bI=new Chart(document.getElementById('bC'),{
    type:'bar',
    data:{labels:rs.map(cap),datasets:[{data:rs.map(function(r){return gv(r)||0;}),backgroundColor:rs.map(function(r){return C[r].bg;}),borderRadius:4,barThickness:22}]},
    options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:11},color:'#888'},beginAtZero:true},y:{grid:{display:false},ticks:{font:{size:12},color:'#444'}}}}
  });
}

function rLine(){
  const ar=rp();let lb,ds,tt;
  if(yr===2025){
    lb=MS.map(function(m){return m+' 25';});
    tt='Evolución 2025 — '+kl();
    let lg='';ar.forEach(function(r){lg+='<span><span class="ldot" style="background:'+C[r].bg+'"></span>'+cap(r)+'</span>';});
    document.getElementById('lL').innerHTML=lg;
    ds=ar.map(function(r){return{label:cap(r),data:R[2025][kp]&&R[2025][kp][r]?R[2025][kp][r]:[],borderColor:C[r].bg,backgroundColor:'transparent',borderWidth:2,pointRadius:3,spanGaps:false,tension:0.3};});
  } else {
    lb=["Mar'25","Abr'25","May'25","Jun'25","Jul'25","Ago'25","Sep'25","Oct'25","Nov'25","Dic'25","Ene'26","Feb'26"];
    tt="Evolución Mar'25-Feb'26 — "+kl();
    let lg='';FR.forEach(function(r){lg+='<span><span class="ldot" style="background:'+C[r].bg+'"></span>'+cap(r)+'</span>';});
    document.getElementById('lL').innerHTML=lg;
    ds=FR.map(function(r){
      const d5=R[2025][kp]&&R[2025][kp][r]?R[2025][kp][r]:[];
      const d6=R[2026][kp]&&R[2026][kp][r]?R[2026][kp][r]:[];
      return{label:cap(r),data:d5.slice(2).concat([d6[0]!==undefined?d6[0]:null,d6[1]!==undefined?d6[1]:null]),borderColor:C[r].bg,backgroundColor:'transparent',borderWidth:2,pointRadius:3,spanGaps:false,tension:0.3};
    });
  }
  document.getElementById('lT').textContent=tt;
  if(lI)lI.destroy();
  lI=new Chart(document.getElementById('lC'),{type:'line',data:{labels:lb,datasets:ds},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:10},color:'#888',autoSkip:false,maxRotation:45}},y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:11},color:'#888'},beginAtZero:true}}}});
}

function rSC(){
  const rl=yr===2026?FR:rp();const n=rl.length;
  const tot={};
  rl.forEach(function(r){tot[r]={};KS.forEach(function(k){tot[r][k.key]=sm(R[yr]&&R[yr][k.key]?R[yr][k.key][r]:null);});});
  const sc={};rl.forEach(function(r){sc[r]={};});
  KS.forEach(function(k){
    const s=rl.slice().sort(function(a,b){return tot[b][k.key]-tot[a][k.key];});
    s.forEach(function(r,i){sc[r][k.key]=n-i;});
  });
  rl.forEach(function(r){let t=0;KS.forEach(function(k){t+=sc[r][k.key];});sc[r]._a=(t/KS.length).toFixed(1);});
  const sl=rl.slice().sort(function(a,b){return parseFloat(sc[b]._a)-parseFloat(sc[a]._a);});
  document.getElementById('scT').textContent='Scorecard — '+(yr===2026?'2026':'2025 completo');
  document.getElementById('mT').innerHTML='Puntaje <strong>1 a '+n+' por KPI</strong>. Score = promedio de 5 KPIs.';
  const cols='130px repeat(5,1fr) 80px';
  let h='<div style="display:grid;grid-template-columns:'+cols+';background:#0C447C;color:#fff;font-size:11px;font-weight:600">';
  h+='<div style="padding:8px 12px">Representante</div>';
  KS.forEach(function(k){h+='<div style="padding:8px 6px;text-align:center">'+k.label+'</div>';});
  h+='<div style="padding:8px 6px;text-align:center">Score</div></div>';
  sl.forEach(function(r,ri){
    const s=sc[r],a=s._a,p=parseFloat(a)/n;
    const pl=p>=0.9?'Top':p>=0.7?'Alto':p>=0.5?'Medio':p>=0.3?'Bajo':'Min';
    const pcb=p>=0.9?'#deeaf8':p>=0.7?'#f5dce6':p>=0.5?'#faeada':'#fdecea';
    const pcc=p>=0.9?'#0C447C':p>=0.7?'#72243E':p>=0.5?'#633806':'#c0392b';
    const bg=ri%2===1?'#fafaf8':'#fff';
    h+='<div style="display:grid;grid-template-columns:'+cols+';border-bottom:1px solid #f0f0ec;font-size:12px;background:'+bg+'">';
    h+='<div style="padding:8px 12px;display:flex;align-items:center;gap:7px">';
    h+='<div style="width:26px;height:26px;border-radius:50%;background:'+C[r].light+';color:'+C[r].text+';display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700">'+r.slice(0,2)+'</div>';
    h+='<span style="font-weight:600">'+cap(r)+'</span></div>';
    KS.forEach(function(k){
      const sv=s[k.key],pct=Math.round((sv/n)*100);
      h+='<div style="padding:8px 6px;text-align:center">';
      h+='<span style="color:'+C[r].bg+';font-weight:700">'+sv+'</span>';
      h+='<div style="background:#eee;border-radius:4px;height:5px;margin-top:3px">';
      h+='<div style="border-radius:4px;height:5px;width:'+pct+'%;background:'+C[r].bg+'"></div></div></div>';
    });
    h+='<div style="padding:8px 6px;text-align:center;font-weight:700;font-size:14px;color:'+C[r].bg+'">'+a;
    h+=' <span style="font-size:10px;padding:2px 6px;border-radius:10px;background:'+pcb+';color:'+pcc+'">'+pl+'</span></div></div>';
  });
  document.getElementById('scE').innerHTML=h;
}
